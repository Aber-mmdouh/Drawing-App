<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="darwing-app.css" />
    <title>Drawing App</title>
  </head>
  <body>
    <canvas id="canvas" width="800" height="700"  #canvas (mousedown)="mouseDown($event)"
    (mouseup)="mouseUp($event)" (mousemove)="mouseMove($event)">
    </canvas>
    <div class="toolbox">
      <button id="decrease" (click)="decreaseSize()">-</button>
      <span id="size">{{size}}</span>
      <button id="increase" (click)="increaseSize()">+</button>
      <input type="color" id="color" #color (change)="changecolor(color.value)">
      <button id="clear" (click)="clear()">X</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
